<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0D0D0F;--bg2:#141416;--bg3:#1C1C1F;--bg4:#242428;
    --border:#2A2A2E;--border2:#333338;
    --text:#F0EFE8;--text2:#9B9A94;--text3:#5A5958;
    --gold:#EF9F27;--gold-dim:#BA7517;--gold-bg:#1F1708;--gold-light:#FAEEDA;
    --green:#639922;--green-bg:#0F1A06;--green-light:#EAF3DE;
    --red:#E24B4A;--red-bg:#1F0909;
    --blue:#185FA5;--blue-bg:#061425;
    --amber:#EF9F27;
    --radius:8px;--radius-lg:12px;
  }
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;line-height:1.5}
  h1,h2,h3,.brand{font-family:'Syne',sans-serif}

  /* LAYOUT */
  .app{max-width:960px;margin:0 auto;padding:24px 20px}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:20px;border-bottom:0.5px solid var(--border)}
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{width:36px;height:36px;border-radius:10px;background:var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:18px}
  .logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;color:var(--text);letter-spacing:-.3px}
  .logo-sub{font-size:11px;color:var(--text2);margin-top:1px}
  .topright{display:flex;align-items:center;gap:10px}
  .save-ind{font-size:11px;color:var(--green);opacity:0;transition:opacity .3s}
  .save-ind.show{opacity:1}
  .date-pill{font-size:11px;color:var(--text2);background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;padding:4px 12px}

  /* TABS */
  .tabs{display:flex;gap:2px;margin-bottom:24px;background:var(--bg2);border-radius:var(--radius);padding:3px;border:0.5px solid var(--border)}
  .tab{flex:1;padding:7px 4px;font-size:11px;font-weight:500;border:none;background:transparent;color:var(--text2);border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Inter',sans-serif}
  .tab:hover{color:var(--text)}
  .tab.active{background:var(--bg4);color:var(--text);border:0.5px solid var(--border2);box-shadow:0 1px 3px rgba(0,0,0,.4)}
  #tc{min-height:400px}

  /* SHARED */
  .sec-lbl{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;margin-top:20px}
  .sec-lbl:first-child{margin-top:0}
  .btn-primary{padding:8px 16px;font-size:11px;font-weight:500;background:var(--gold-dim);color:var(--gold-light);border:none;border-radius:var(--radius);cursor:pointer;transition:background .15s;font-family:'Inter',sans-serif}
  .btn-primary:hover{background:var(--gold)}
  .btn-sec{padding:7px 12px;font-size:11px;background:transparent;color:var(--text2);border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-family:'Inter',sans-serif}
  .btn-sec:hover{color:var(--text);border-color:var(--border2)}
  .show-add{width:100%;margin-top:8px;padding:10px 12px;border:0.5px dashed var(--border2);border-radius:var(--radius);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;transition:all .15s}
  .show-add:hover{background:var(--bg3);color:var(--text)}
  .badge{font-size:9px;font-weight:500;padding:2px 8px;border-radius:20px;cursor:pointer;border:none;white-space:nowrap;font-family:'Inter',sans-serif}
  .bl{background:var(--green-bg);color:var(--green);border:0.5px solid var(--green)}
  .bb{background:var(--gold-bg);color:var(--gold);border:0.5px solid var(--gold-dim)}
  .bp{background:var(--bg4);color:var(--text2);border:0.5px solid var(--border2)}

  /* CHANNELS */
  .ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .ch-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:border-color .15s}
  .ch-card.ch-live{border-color:var(--gold-dim)}
  .ch-card:hover{border-color:var(--border2)}
  .ch-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
  .ch-name{font-size:13px;font-weight:600;color:var(--text);cursor:pointer;font-family:'Syne',sans-serif}
  .ch-niche{font-size:10px;color:var(--text2);margin-top:3px}
  .ch-name-inp{font-size:13px;font-weight:600;color:var(--text);border:none;border-bottom:1px solid var(--gold);background:transparent;outline:none;width:100%;font-family:'Syne',sans-serif}
  .ch-stats{display:flex;gap:16px}
  .ch-stat .v{font-size:15px;font-weight:600;color:var(--text);font-family:'Syne',sans-serif}
  .ch-stat .l{font-size:9px;color:var(--text2);margin-top:1px;text-transform:uppercase;letter-spacing:.04em}
  .rpm-bar{height:2px;background:var(--bg4);border-radius:2px;margin-top:10px;overflow:hidden}
  .rpm-fill{height:100%;border-radius:2px;background:var(--gold);transition:width .5s}
  .ch-note{font-size:10px;color:var(--text3);margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);cursor:pointer}
  .ch-note:hover{color:var(--text2)}
  .ch-note-inp{font-size:10px;color:var(--text);border:none;border-bottom:0.5px solid var(--border2);background:transparent;outline:none;width:100%;font-family:'Inter',sans-serif;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)}

  /* PIPELINE */
  .pipe-sel{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .pipe-btn{font-size:10px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
  .pipe-btn.sel{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-dim)}
  .stages{display:flex;flex-direction:column;gap:6px}
  .stage{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
  .stage:hover{border-color:var(--border2)}
  .stage.sd{border-color:var(--green)}
  .stage.sc{border:1.5px solid var(--gold)}
  .stage.sp{opacity:.5}
  .sdot{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .2s}
  .sdot.d{background:var(--green);border-color:var(--green);color:#fff}
  .sdot.c{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light)}
  .s-inf{flex:1}
  .s-name{font-size:12px;font-weight:500;color:var(--text)}
  .s-det{font-size:10px;color:var(--text2);margin-top:2px}
  .s-tool{font-size:9px;padding:2px 8px;background:var(--bg4);border-radius:20px;color:var(--text2);white-space:nowrap}
  .t-row{display:flex;gap:8px;margin-top:14px}
  .t-card{flex:1;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;text-align:center}
  .t-card .v{font-size:18px;font-weight:600;color:var(--text);font-family:'Syne',sans-serif}
  .t-card .l{font-size:9px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}

  /* QUEUE */
  .q-filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .qf{font-size:10px;padding:4px 11px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
  .qf.sel{background:var(--bg3);color:var(--text);border-color:var(--border2)}
  .q-search{font-size:11px;padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;width:100%;margin-bottom:12px;font-family:'Inter',sans-serif;transition:border-color .15s}
  .q-search:focus{border-color:var(--gold-dim)}
  .q-search::placeholder{color:var(--text3)}
  .q-stats{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .q-stat-pill{font-size:10px;padding:3px 10px;border-radius:20px}
  .q-list{display:flex;flex-direction:column;gap:5px;max-height:420px;overflow-y:auto;padding-right:2px}
  .q-list::-webkit-scrollbar{width:3px}
  .q-list::-webkit-scrollbar-track{background:var(--bg2)}
  .q-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  .q-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:9px 12px;display:flex;align-items:flex-start;gap:8px;transition:border-color .15s;cursor:default}
  .q-item:hover{border-color:var(--border2)}
  .q-pri{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;cursor:pointer}
  .q-pri.high{background:var(--red)}.q-pri.mid{background:var(--gold)}.q-pri.low{background:var(--green)}
  .q-day{font-size:10px;color:var(--text2);min-width:28px;margin-top:1px;font-weight:500}
  .q-body{flex:1;min-width:0}
  .q-title{font-size:11px;font-weight:500;color:var(--text);line-height:1.4;cursor:pointer;transition:color .15s}
  .q-title:hover{color:var(--gold)}
  .q-meta{display:flex;gap:5px;margin-top:4px;align-items:center;flex-wrap:wrap}
  .q-ch-l{font-size:9px;color:var(--text2)}
  .q-src{font-size:9px;padding:1px 6px;background:var(--bg4);border-radius:4px;color:var(--text2)}
  .q-st{font-size:9px;padding:1px 7px;border-radius:20px}
  .st-s{background:var(--green-bg);color:var(--green)}
  .st-r{background:var(--blue-bg);color:var(--blue)}
  .st-i{background:var(--bg4);color:var(--text2)}
  .q-del{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:4px;background:transparent;border:none;opacity:0;transition:all .15s;flex-shrink:0}
  .q-item:hover .q-del{opacity:1}
  .q-del:hover{color:var(--red);background:var(--red-bg)}
  .add-form{background:var(--bg2);border:0.5px dashed var(--border2);border-radius:var(--radius);padding:12px;margin-top:10px}
  .add-inp{flex:1;font-size:11px;padding:7px 10px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);outline:none;font-family:'Inter',sans-serif;transition:border-color .15s}
  .add-inp:focus{border-color:var(--gold-dim)}
  .add-inp::placeholder{color:var(--text3)}
  .add-sels{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .add-sel{flex:1;min-width:80px;font-size:10px;padding:6px 8px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);outline:none;cursor:pointer;font-family:'Inter',sans-serif}
  .add-sel:focus{border-color:var(--gold-dim)}

  /* SCRIPT ENGINE */
  .script-layout{display:grid;grid-template-columns:1fr 190px;gap:16px}
  .script-form{display:flex;flex-direction:column;gap:10px}
  .script-inp{font-size:11px;padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;width:100%;font-family:'Inter',sans-serif;transition:border-color .15s}
  .script-inp:focus{border-color:var(--gold-dim)}
  .script-inp::placeholder{color:var(--text3)}
  .script-ta{font-size:11px;padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;width:100%;resize:vertical;min-height:70px;font-family:'Inter',sans-serif;transition:border-color .15s}
  .script-ta:focus{border-color:var(--gold-dim)}
  .script-ta::placeholder{color:var(--text3)}
  .script-label{font-size:10px;color:var(--text2);margin-bottom:4px}

  .ab-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;transition:border-color .15s}
  .ab-card:hover{border-color:var(--border2)}
  .ab-type{font-size:9px;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:8px}
  .ab-curiosity{background:var(--blue-bg);color:#5BA3F5}
  .ab-fear{background:var(--red-bg);color:#F07070}
  .ab-result{background:var(--green-bg);color:var(--green)}
  .ab-inp{font-size:11px;padding:6px 8px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);outline:none;width:100%;font-family:'Inter',sans-serif;transition:border-color .15s}
  .ab-inp:focus{border-color:var(--gold-dim)}
  .ab-inp::placeholder{color:var(--text3)}
  .ab-hint{font-size:9px;color:var(--text3);margin-top:5px;line-height:1.4}
  .ret-sidebar{display:flex;flex-direction:column;gap:7px}
  .ret-metric{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:8px 10px}
  .ret-metric .v{font-size:15px;font-weight:600;font-family:'Syne',sans-serif}
  .ret-metric .l{font-size:9px;color:var(--text2);margin-top:2px;line-height:1.4}
  .ret-metric.good .v{color:var(--green)}
  .ret-metric.warn .v{color:var(--gold)}
  .ret-metric.bad .v{color:var(--red)}
  .ret-rule{background:var(--bg3);border-radius:var(--radius);padding:7px 10px;font-size:9px;color:var(--text2);line-height:1.5}
  .ret-rule strong{color:var(--text)}
  .checklist{display:flex;flex-direction:column;gap:5px;margin-top:10px}
  .check-item{display:flex;align-items:flex-start;gap:10px;font-size:11px;padding:8px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s}
  .check-item.checked{background:rgba(99,153,34,.05);border-color:var(--green)}
  .check-item:hover{border-color:var(--border2)}
  .check-box{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .2s}
  .check-item.checked .check-box{background:var(--green);border-color:var(--green);color:#fff}
  .check-text{flex:1;color:var(--text);line-height:1.5}

  /* TOOLS */
  .tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .tool-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:11px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;text-decoration:none}
  .tool-card:hover{border-color:var(--gold-dim);background:var(--bg3)}
  .tool-dot{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
  .tool-nm{font-size:11px;font-weight:500;color:var(--text)}
  .tool-us{font-size:9px;color:var(--text2);margin-top:2px}
  .sched-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px}
  .sched-r{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:0.5px solid var(--border)}
  .sched-r:last-child{border:none}
  .sched-d{font-size:11px;font-weight:500;color:var(--text);width:80px;flex-shrink:0}
  .sched-t{font-size:11px;color:var(--text2);flex:1}
  .sched-h{font-size:11px;color:var(--gold);white-space:nowrap;font-weight:500}
  .sched-tot{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border2)}
  .sched-tot span{font-size:11px;color:var(--text2)}
  .sched-tot strong{font-size:13px;font-weight:600;color:var(--gold);font-family:'Syne',sans-serif}
  .repo-badge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);text-decoration:none;transition:border-color .15s;margin-bottom:14px}
  .repo-badge:hover{border-color:var(--gold-dim)}
  .repo-icon{font-size:18px}
  .repo-info .name{font-size:11px;font-weight:500;color:var(--text)}
  .repo-info .desc{font-size:9px;color:var(--text2);margin-top:2px}

  /* EMPTY */
  .empty{text-align:center;padding:2rem;color:var(--text2);font-size:12px}

  /* DIVIDER */
  .divider{height:0.5px;background:var(--border);margin:16px 0}

  @media(max-width:640px){
    .ch-grid,.ab-grid,.script-layout,.tools-grid{grid-template-columns:1fr}
    .script-layout{grid-template-columns:1fr}
  }
</style>
</head>

// ─── State ────────────────────────────────────────────────────────────────────
let S = {
  channels: [], pipeline: {}, queue: [], checks: [],
  tab: 'channels', pipeCh: 'ch0',
  qFilter: 'all', qSearch: '',
  addForm: false, editName: null, editNote: null,
  scriptTopic: '', scriptPoints: '',

// ─── Init ─────────────────────────────────────────────────────────────────────
function load() {
  S.channels  = storage.get('ccc:channels')  || DC;
  S.pipeline  = storage.get('ccc:pipeline')  || DP;
  const ex    = storage.get('ccc:queue')     || [];
  const et    = new Set(ex.map(q => q.title.toLowerCase().trim()));
  S.queue     = [...ex, ...SEED_QUEUE.filter(s => !et.has(s.title.toLowerCase().trim()))];
  const rawC  = storage.get('ccc:checks');
  S.checks    = rawC && rawC.length ? rawC : DEFAULT_CHECKS.map(t => ({text:t,done:false}));
  save();
  render();
}

function save() {
  storage.set('ccc:channels', S.channels);
  storage.set('ccc:pipeline', S.pipeline);
  storage.set('ccc:queue',    S.queue);
  storage.set('ccc:checks',   S.checks);
  const el = document.getElementById('si');
  if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1500); }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const d = new Date();
  document.getElementById('app').innerHTML = `
<div class="topbar">

    <div class="logo-icon">🎬</div>

function go(t) { S.tab = t; renderTab(); }
function renderTab() {

}

function copyScriptPrompt() {

  if (!topic.trim()) { alert('Add a video topic first'); return; }
  const prompt = `Using the AgriciDaniel/claude-youtube retention-scripting framework, write a full retention-engineered script for Grimm Archives.

Topic: ${topic}
Key points:
${pts || '(use your knowledge of this topic)'}

Channel: Grimm Archives — US audience, history/finance mystery, faceless (AI visuals + AI voiceover)
Target length: 10–12 minutes
Tone: Cinematic, mysterious, gut-punch endings

Apply the full framework:
- 3-part Hook: Grab (0–5s), Promise (5–15s), Stakes (15–30s) — target 70%+ retention at 30s
- Never open with "Hey guys welcome back"
- Pattern interrupt every 60–90s with type tags: [CAMERA CHANGE] [B-ROLL CUE] [GRAPHIC] [SOUND EFFECT] [UNEXPECTED STAT]
- Soft CTA at ~1 min (60% of viewers still watching)
- Open loop planted mid-video (suspension bridge = 68% higher completion)
- Retention re-hook at ~60% mark (second hook moment)
- Hard CTA in outro — never "thanks for watching" — maintain energy to last second
- Include Pattern Interrupt Log table and Retention Risk Map
- Include [VISUAL] and [SFX] cue markers for Whisk/Hunyuan production
- Script must match title/description exactly (YouTube AI reads captions)`;
  navigator.clipboard.writeText(prompt).then(() => {
    alert('✓ Script prompt copied! Paste it into Claude.');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = prompt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('✓ Script prompt copied! Paste it into Claude.');
  });
}

    <div class="check-box">${c.done?'✓':''}</div>
    <div class="check-text">${c.text}</div>
  </div>`).join('');
}

function resetChecks() {
  if (!confirm('Reset all checklist items for a new video?')) return;
  S.checks = S.checks.map(c => ({...c, done: false}));
  save();
  renderTab();
}
